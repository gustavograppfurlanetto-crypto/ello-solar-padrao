<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ello Solar — Troca de Padrão</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #EEF3F5; --surface: #FFFFFF; --surface2: #E4EEF2;
    --border: #C8DDE5; --border2: #AAC8D4;
    --text: #002A38; --text2: #3D6472; --text3: #7A9DAA;
    --accent: #004358; --accent-bg: #D6E8EF; --accent-text: #003047;
    --accent2: #FD7400; --accent2-bg: #FFF0E0; --accent2-text: #C25A00;
    --lime: #BEDB39; --lime-bg: #F3FAD0; --lime-text: #5A7000;
    --teal: #1F8A70; --teal-bg: #D5F0E9; --teal-text: #145C4A;
    --sky: #58AFDA; --sky-bg: #DDF1FA; --sky-text: #1A6B92;
    --success: #1F8A70; --success-bg: #D5F0E9;
    --warning: #C25A00; --warning-bg: #FFF0E0;
    --danger: #B91C1C; --danger-bg: #FEF2F2;
    --neutral: #3D6472; --neutral-bg: #E4EEF2;
    --orange: #C25A00; --orange-bg: #FFF0E0;
    --sidebar-bg: #004358; --sidebar-text: #B8D8E4; --sidebar-text-active: #FFFFFF;
    --radius: 10px; --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,67,88,0.08),0 1px 2px rgba(0,67,88,0.05);
    --shadow-md: 0 4px 16px rgba(0,67,88,0.12);
  }
  body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; font-size:14px; line-height:1.5; }
  .layout { display:flex; min-height:100vh; }
  .sidebar { width:220px; background:var(--sidebar-bg); border-right:none; flex-shrink:0; display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; }
  .sidebar-logo { padding:24px 20px 20px; border-bottom:1px solid rgba(255,255,255,0.1); }
  .logo-mark { display:flex; align-items:center; gap:10px; }
  .logo-icon { width:32px; height:32px; background:var(--text); border-radius:8px; display:flex; align-items:center; justify-content:center; }
  .logo-name { font-size:13px; font-weight:600; letter-spacing:-0.3px; color:var(--text); line-height:1.2; }
  .logo-sub { font-size:11px; color:var(--text3); }
  .sidebar-nav { padding:16px 12px; flex:1; }
  .nav-label { font-size:10px; font-weight:600; letter-spacing:0.8px; text-transform:uppercase; color:rgba(184,216,228,0.6); padding:0 8px; margin-bottom:6px; margin-top:12px; }
  .nav-item { display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:var(--radius-sm); cursor:pointer; color:var(--sidebar-text); font-size:13.5px; font-weight:400; transition:all 0.15s; border:none; background:none; width:100%; text-align:left; }
  .nav-item:hover { background:rgba(255,255,255,0.08); color:#fff; }
  .nav-item.active { background:var(--accent2); color:#fff; font-weight:600; }
  .nav-item svg { width:16px; height:16px; flex-shrink:0; }
  .sidebar-footer { padding:16px 12px; border-top:1px solid rgba(255,255,255,0.1); }
  .stat-mini { background:rgba(255,255,255,0.08); border-radius:var(--radius-sm); padding:10px 12px; }
  .stat-mini-label { font-size:11px; color:var(--sidebar-text); margin-bottom:2px; }
  .stat-mini-value { font-size:20px; font-weight:600; color:#fff; font-family:'DM Mono',monospace; }
  .main { margin-left:220px; flex:1; display:flex; flex-direction:column; }
  .topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 28px; height:58px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; border-left:4px solid var(--accent2); }
  .topbar-title { font-size:15px; font-weight:600; color:var(--text); }
  .btn { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:var(--radius-sm); font-size:13px; font-weight:500; cursor:pointer; border:1px solid transparent; transition:all 0.15s; font-family:'Outfit',sans-serif; line-height:1; }
  .btn-primary { background:var(--accent2); color:white; border-color:var(--accent2); }
  .btn-primary:hover { background:#D96300; }
  .btn-ghost { background:none; color:var(--text2); border-color:var(--border2); }
  .btn-ghost:hover { background:var(--surface2); color:var(--text); }
  .btn svg { width:15px; height:15px; }
  .content { padding:28px; flex:1; }
  .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; box-shadow:var(--shadow); }
  .stat-card-label { font-size:11.5px; color:var(--text3); font-weight:500; margin-bottom:6px; display:flex; align-items:center; gap:6px; }
  .stat-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .stat-card-value { font-size:26px; font-weight:600; color:var(--text); font-family:'DM Mono',monospace; letter-spacing:-1px; }
  .table-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
  .table-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  .table-header-left { display:flex; align-items:center; gap:12px; }
  .table-title { font-size:14px; font-weight:600; color:var(--text); }
  .search-input { display:flex; align-items:center; gap:6px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:6px 10px; }
  .search-input svg { width:14px; height:14px; color:var(--text3); flex-shrink:0; }
  .search-input input { border:none; background:none; outline:none; font-family:'Outfit',sans-serif; font-size:13px; color:var(--text); width:200px; }
  .search-input input::placeholder { color:var(--text3); }
  .filter-select { border:1px solid var(--border2); background:var(--surface2); border-radius:var(--radius-sm); padding:6px 10px; font-family:'Outfit',sans-serif; font-size:13px; color:var(--text2); outline:none; cursor:pointer; }
  table { width:100%; border-collapse:collapse; }
  thead th { padding:10px 16px; text-align:left; font-size:11px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase; color:var(--text2); background:var(--surface2); border-bottom:1px solid var(--border); }
  tbody tr { border-bottom:1px solid var(--border); transition:background 0.1s; cursor:pointer; }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:hover { background:var(--surface2); }
  tbody td { padding:13px 16px; font-size:13px; color:var(--text); vertical-align:middle; }
  .td-mono { font-family:'DM Mono',monospace; font-size:12px; color:var(--text2); }
  .td-name { font-weight:500; }
  .badge { display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:20px; font-size:11.5px; font-weight:500; white-space:nowrap; }
  .badge-dot { width:5px; height:5px; border-radius:50%; }
  .badge-aberto { background:var(--neutral-bg); color:var(--neutral); }
  .badge-aguardando { background:var(--warning-bg); color:var(--warning); }
  .badge-em_andamento { background:var(--sky-bg); color:var(--sky-text); }
  .badge-concluido { background:var(--teal-bg); color:var(--teal-text); }
  .badge-tipo { background:var(--surface2); color:var(--text2); font-size:11px; }
  .badge-deslig { background:var(--orange-bg); color:var(--orange); font-size:11px; }
  .empty-state { padding:60px 20px; text-align:center; color:var(--text3); }
  .empty-state svg { margin:0 auto 12px; display:block; color:var(--border2); }
  .empty-state p { font-size:13px; }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:100; align-items:center; justify-content:center; padding:24px; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--surface); border-radius:14px; width:100%; max-width:640px; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow-md); }
  .modal-header { padding:20px 24px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:var(--surface); z-index:1; }
  .modal-title { font-size:15px; font-weight:600; color:var(--text); }
  .modal-close { width:28px; height:28px; border:none; background:var(--surface2); border-radius:6px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text2); transition:background 0.15s; }
  .modal-close:hover { background:var(--border); }
  .modal-close svg { width:14px; height:14px; }
  .modal-body { padding:20px 24px; }
  .form-section { margin-bottom:20px; }
  .form-section-title { font-size:11px; font-weight:600; letter-spacing:0.6px; text-transform:uppercase; color:var(--text3); margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--border); }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .form-grid .full { grid-column:1/-1; }
  .form-group { display:flex; flex-direction:column; gap:5px; }
  label { font-size:12px; font-weight:500; color:var(--text2); }
  .required::after { content:' *'; color:var(--danger); }
  input[type="text"],input[type="email"],input[type="date"],select,textarea { border:1px solid var(--border2); border-radius:var(--radius-sm); padding:8px 10px; font-family:'Outfit',sans-serif; font-size:13px; color:var(--text); background:var(--surface); outline:none; transition:border-color 0.15s; width:100%; }
  input:focus,select:focus,textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,67,88,0.1); }
  textarea { resize:vertical; min-height:72px; }
  .deslig-block { display:none; background:var(--orange-bg); border:1px solid #FED7AA; border-radius:var(--radius); padding:16px; margin-top:4px; }
  .deslig-block.visible { display:block; }
  .deslig-block input,.deslig-block select { background:white; }
  .deslig-title { font-size:11.5px; font-weight:600; color:var(--orange); margin-bottom:12px; display:flex; align-items:center; gap:6px; }
  .radio-row { display:flex; align-items:center; gap:16px; margin-bottom:10px; }
  .radio-label { display:flex; align-items:center; gap:5px; font-size:12px; font-weight:400; color:var(--text2); cursor:pointer; }
  .radio-label input[type="radio"] { width:auto; accent-color:var(--accent); }
  .checkbox-row { display:flex; align-items:center; gap:6px; }
  .checkbox-row input[type="checkbox"] { width:auto; accent-color:var(--accent); cursor:pointer; }
  .modal-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; position:sticky; bottom:0; background:var(--surface); }
  .detail-section { margin-bottom:16px; }
  .detail-section-title { font-size:11px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase; color:var(--text3); margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:6px; }
  .detail-grid { display:grid; grid-template-columns:1fr 1fr; }
  .detail-item { padding:9px 0; border-bottom:1px solid var(--border); }
  .detail-item:nth-child(odd) { padding-right:16px; }
  .detail-item:nth-child(even) { padding-left:16px; border-left:1px solid var(--border); }
  .detail-full { padding:9px 0; border-bottom:1px solid var(--border); grid-column:1/-1; }
  .detail-label { font-size:11px; color:var(--text3); font-weight:500; margin-bottom:2px; text-transform:uppercase; letter-spacing:0.4px; }
  .detail-value { font-size:13.5px; color:var(--text); }
  .deslig-detail-block { background:var(--orange-bg); border:1px solid #FED7AA; border-radius:var(--radius); padding:14px 16px; }
  .deslig-detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px 20px; }
  .deslig-detail-item .detail-label { color:#92400E; }
  .status-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
  .btn-status { padding:6px 12px; border-radius:20px; font-size:12px; font-weight:500; cursor:pointer; border:1px solid; transition:all 0.15s; font-family:'Outfit',sans-serif; }
  .btn-status-aguardando { background:var(--warning-bg); color:var(--warning); border-color:#F6D860; }
  .btn-status-em_andamento { background:var(--sky-bg); color:var(--sky-text); border-color:#9FD9F0; }
  .btn-status-concluido { background:var(--teal-bg); color:var(--teal-text); border-color:#7FD4C0; }
  .loading { display:flex; align-items:center; justify-content:center; padding:40px; color:var(--text3); font-size:13px; gap:8px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .spinner { width:16px; height:16px; border:2px solid var(--border2); border-top-color:var(--text2); border-radius:50%; animation:spin 0.7s linear infinite; }
  .toast { position:fixed; bottom:24px; right:24px; background:var(--text); color:white; padding:10px 16px; border-radius:var(--radius-sm); font-size:13px; font-weight:500; z-index:999; box-shadow:var(--shadow-md); transform:translateY(80px); opacity:0; transition:all 0.25s; }
  .toast.show { transform:translateY(0); opacity:1; }
  .toast.error { background:var(--danger); }
  .count-badge { background:var(--surface2); border:1px solid var(--border); color:var(--text2); font-size:11px; font-weight:600; padding:2px 7px; border-radius:20px; font-family:'DM Mono',monospace; }
  .pagination { display:flex; align-items:center; justify-content:space-between; padding:12px 20px; border-top:1px solid var(--border); font-size:12px; color:var(--text3); }
  .page-btns { display:flex; gap:4px; }
  .page-btn { width:28px; height:28px; border:1px solid var(--border2); background:var(--surface); border-radius:var(--radius-sm); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--text2); transition:all 0.1s; font-family:'Outfit',sans-serif; }
  .page-btn:hover { background:var(--surface2); }
  .page-btn.active { background:var(--text); color:white; border-color:var(--text); }
  .page-btn:disabled { opacity:0.4; cursor:not-allowed; }
</style>
</head>

<script>
const SURL='https://zsaomhnehwervejkldam.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzYW9taG5laHdlcnZlamtsZGFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NzI5MzcsImV4cCI6MjA5MjU0ODkzN30._QYsLEIHxQV6UV90SPMWxds9BaGVvWuDy_6URN7Pavg';
const H={'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Content-Type':'application/json','Prefer':'return=representation'};

let all=[],filtered=[],page=1,activeStatus='';
const PER=10;
const TL={aumento_carga:'Aumento de carga',troca_padrao:'Troca de padrão',alteracao_conexao:'Alteração de conexão',desligamento:'Desligamento'};
const CL={monofasico:'Monofásico',bifasico:'Bifásico',trifasico:'Trifásico'};
const SL={aberto:'Aberto',aguardando:'Aguardando',em_andamento:'Em andamento',concluido:'Concluído'};
const SC={aberto:'#9CA3AF',aguardando:'#F59E0B',em_andamento:'#58AFDA',concluido:'#1F8A70'};

async function api(m,p,b){
  const o={method:m,headers:H};
  if(b)o.body=JSON.stringify(b);
  const r=await fetch(SURL+p,o);
  if(!r.ok)throw new Error(await r.text());
  if(r.status===204)return null;
  return r.json();
}

async function load(){
  try{
    all=await api('GET','/rest/v1/pedidos?select=*&order=created_at.desc');
    applyFilters();updateStats();
  }catch(e){
    document.getElementById('table-container').innerHTML='<div class="empty-state"><p style="color:var(--danger)">Erro ao carregar pedidos.</p></div>';
  }
}

function updateStats(){
  const c={aberto:0,aguardando:0,em_andamento:0,concluido:0};
  all.forEach(p=>c[p.status]++);
  Object.keys(c).forEach(k=>{const el=document.getElementById('stat-'+k);if(el)el.textContent=c[k];});
  document.getElementById('sidebar-total').textContent=all.length;
}

function applyFilters(){
  const s=document.getElementById('search-input').value.toLowerCase();
  const t=document.getElementById('filter-tipo').value;
  const st=document.getElementById('filter-status').value||activeStatus;
  filtered=all.filter(p=>{
    const ms=!s||p.nome_titular.toLowerCase().includes(s)||p.unidade_consumidora.toLowerCase().includes(s)||p.cpf.includes(s);
    return ms&&(!t||p.tipo_solicitacao===t)&&(!st||p.status===st);
  });
  page=1;renderTable();
}

function renderTable(){
  const start=(page-1)*PER;
  const pg=filtered.slice(start,start+PER);
  const total=filtered.length;
  document.getElementById('table-count').textContent=total;
  if(!total){
    document.getElementById('table-container').innerHTML='<div class="empty-state"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p>Nenhum pedido encontrado</p></div>';
    document.getElementById('pagination').style.display='none';return;
  }
  const rows=pg.map(p=>{
    const sb=`<span class="badge badge-${p.status}"><span class="badge-dot" style="background:${SC[p.status]}"></span>${SL[p.status]}</span>`;
    const tb=`<span class="badge badge-tipo">${TL[p.tipo_solicitacao]||p.tipo_solicitacao}</span>`;
    const di=p.uc_desligamento?` <span class="badge badge-deslig" title="UC vinculada: ${p.uc_desligamento}"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:-1px"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg> Deslig.</span>`:'';
    const d=new Date(p.created_at).toLocaleDateString('pt-BR');
    return `<tr onclick="openDetail('${p.id}')"><td class="td-name">${p.nome_titular}</td><td class="td-mono">${p.cpf}</td><td class="td-mono">${p.unidade_consumidora}</td><td>${tb}${di}</td><td>${sb}</td><td class="td-mono" style="color:var(--text3)">${d}</td></tr>`;
  }).join('');
  document.getElementById('table-container').innerHTML=`<table><thead><tr><th>Nome do titular</th><th>CPF</th><th>Unidade consumidora</th><th>Tipo</th><th>Status</th><th>Data</th></tr></thead><tbody>${rows}</tbody></table>`;
  const tp=Math.ceil(total/PER);
  const pel=document.getElementById('pagination');
  pel.style.display='flex';
  document.getElementById('pagination-info').textContent=`Mostrando ${start+1}–${Math.min(start+PER,total)} de ${total}`;
  let btns=`<button class="page-btn" onclick="goP(${page-1})" ${page===1?'disabled':''}>‹</button>`;
  for(let i=1;i<=tp;i++){
    if(tp>7&&i>2&&i<tp-1&&Math.abs(i-page)>1){if(i===3||i===tp-2)btns+=`<span style="padding:0 4px;color:var(--text3)">…</span>`;continue;}
    btns+=`<button class="page-btn ${i===page?'active':''}" onclick="goP(${i})">${i}</button>`;
  }
  btns+=`<button class="page-btn" onclick="goP(${page+1})" ${page===tp?'disabled':''}>›</button>`;
  document.getElementById('page-btns').innerHTML=btns;
}

function goP(p){const tp=Math.ceil(filtered.length/PER);if(p<1||p>tp)return;page=p;renderTable();}

let currentPedido = null;

function openDetail(id){
  currentPedido = all.find(x=>x.id===id);
  const p=currentPedido;
  if(!p)return;
  document.getElementById('detail-title').textContent=p.nome_titular;
  const d=new Date(p.created_at).toLocaleDateString('pt-BR');
  const dn=p.data_nascimento?new Date(p.data_nascimento+'T00:00:00').toLocaleDateString('pt-BR'):'—';
  const so=Object.entries(SL).filter(([k])=>k!==p.status)
    .map(([k,v])=>`<button class="btn-status btn-status-${k}" onclick="updateStatus('${id}','${k}')">${v}</button>`).join('');

  let desligHtml='';
  if(p.uc_desligamento){
    const ti=p.titular_desligamento
      ?`<div class="deslig-detail-item"><div class="detail-label">Nome</div><div class="detail-value">${p.titular_desligamento}</div></div>
         <div class="deslig-detail-item"><div class="detail-label">CPF</div><div class="detail-value">${p.cpf_desligamento||'—'}</div></div>
         <div class="deslig-detail-item"><div class="detail-label">Nascimento</div><div class="detail-value">${p.nascimento_desligamento?new Date(p.nascimento_desligamento+'T00:00:00').toLocaleDateString('pt-BR'):'—'}</div></div>
         <div class="deslig-detail-item"><div class="detail-label">Telefone</div><div class="detail-value">${p.telefone_desligamento||'—'}</div></div>
         <div class="deslig-detail-item"><div class="detail-label">E-mail</div><div class="detail-value">${p.email_desligamento||'—'}</div></div>
         <div class="deslig-detail-item"><div class="detail-label">Nome da mãe</div><div class="detail-value">${p.nome_mae_desligamento||'—'}</div></div>
         <div class="deslig-detail-item"><div class="detail-label">Nome do pai</div><div class="detail-value">${p.nome_pai_desligamento||'—'}</div></div>
         ${p.endereco_desligamento?`<div class="deslig-detail-item" style="grid-column:1/-1"><div class="detail-label">Endereço</div><div class="detail-value">${p.endereco_desligamento}${p.referencia_desligamento?' — '+p.referencia_desligamento:''}</div></div>`:''}
        `
      :`<div class="deslig-detail-item" style="grid-column:1/-1"><div class="detail-label">Titular</div><div class="detail-value">${p.nome_titular} <span style="color:var(--text3);font-size:12px">(mesmo titular do pedido)</span></div></div>`;
    const extras=p.ucs_desligamento_extras||[];
    const extrasHtml=extras.map((e,i)=>{
      const titE=e.titular
        ?`<div class="deslig-detail-item"><div class="detail-label">Nome</div><div class="detail-value">${e.titular}</div></div>
           <div class="deslig-detail-item"><div class="detail-label">CPF</div><div class="detail-value">${e.cpf||'—'}</div></div>
           <div class="deslig-detail-item"><div class="detail-label">Nascimento</div><div class="detail-value">${e.nascimento?new Date(e.nascimento+'T00:00:00').toLocaleDateString('pt-BR'):'—'}</div></div>
           <div class="deslig-detail-item"><div class="detail-label">Telefone</div><div class="detail-value">${e.telefone||'—'}</div></div>
           <div class="deslig-detail-item"><div class="detail-label">E-mail</div><div class="detail-value">${e.email||'—'}</div></div>
           <div class="deslig-detail-item"><div class="detail-label">Nome da mãe</div><div class="detail-value">${e.nome_mae||'—'}</div></div>
           <div class="deslig-detail-item"><div class="detail-label">Nome do pai</div><div class="detail-value">${e.nome_pai||'—'}</div></div>
           ${e.endereco?`<div class="deslig-detail-item" style="grid-column:1/-1"><div class="detail-label">Endereço</div><div class="detail-value">${e.endereco}${e.referencia?' — '+e.referencia:''}</div></div>`:''}`
        :`<div class="deslig-detail-item" style="grid-column:1/-1"><div class="detail-label">Titular</div><div class="detail-value">${p.nome_titular} <span style="color:var(--text3);font-size:12px">(mesmo titular)</span></div></div>`;
      return `<div style="margin-top:10px;padding-top:10px;border-top:1px dashed #FED7AA;">
        <div style="font-size:10px;font-weight:600;color:var(--orange);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">UC ${i+2}</div>
        <div class="deslig-detail-grid">
          <div class="deslig-detail-item"><div class="detail-label">Unidade consumidora</div><div class="detail-value" style="font-family:'DM Mono',monospace;font-size:13px">${e.uc}</div></div>
          ${titE}
        </div></div>`;
    }).join('');
    desligHtml=`<div class="detail-section">
      <div class="detail-section-title"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>Desligamento vinculado</div>
      <div class="deslig-detail-block">
        ${extras.length?'<div style="font-size:10px;font-weight:600;color:var(--orange);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">UC 1</div>':''}
        <div class="deslig-detail-grid">
          <div class="deslig-detail-item"><div class="detail-label">Unidade consumidora</div><div class="detail-value" style="font-family:'DM Mono',monospace;font-size:13px">${p.uc_desligamento}</div></div>
          ${ti}
        </div>
        ${extrasHtml}
      </div>
    </div>`;
  }

  document.getElementById('detail-body').innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
      <span class="badge badge-${p.status}" style="font-size:12.5px;padding:4px 10px"><span class="badge-dot" style="background:${SC[p.status]}"></span>${SL[p.status]}</span>
      <span class="badge badge-tipo">${TL[p.tipo_solicitacao]}${p.tipo_conexao?' · '+CL[p.tipo_conexao]:''}</span>
      ${p.uc_desligamento?'<span class="badge badge-deslig"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:-1px"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg> Com desligamento</span>':''}

function removeUcExtra(idx){
  const el=document.getElementById('uc-extra-'+idx);
  if(el)el.remove();
}

function onTitularExtraChange(idx){
  const v=document.querySelector(`input[name="titular-extra-${idx}"]:checked`).value;
  document.getElementById('outro-titular-extra-'+idx).style.display=v==='outro'?'block':'none';
}

function resetUcsExtras(){
  document.getElementById('ucs-extras-container').innerHTML='';
  ucExtrasCount=0;
}

function collectUcsExtras(){
  const extras=[];
  document.querySelectorAll('[id^="uc-extra-"]').forEach(div=>{
    const idx=div.id.replace('uc-extra-','');
    const uc=(document.getElementById('f-uc-extra-'+idx)||{}).value?.trim();
    if(!uc)return;
    const titOpt=document.querySelector(`input[name="titular-extra-${idx}"]:checked`)?.value;
    const entry={uc};
    if(titOpt==='outro'){
      entry.titular=document.getElementById('f-tit-extra-'+idx)?.value.trim()||null;
      entry.cpf=document.getElementById('f-cpf-extra-'+idx)?.value.trim()||null;
      entry.nascimento=document.getElementById('f-nasc-extra-'+idx)?.value||null;
      entry.nome_mae=document.getElementById('f-mae-extra-'+idx)?.value.trim()||null;
      entry.nome_pai=document.getElementById('f-pai-extra-'+idx)?.value.trim()||null;
      entry.telefone=document.getElementById('f-tel-extra-'+idx)?.value.trim()||null;
      entry.email=document.getElementById('f-email-extra-'+idx)?.value.trim()||null;
      entry.endereco=document.getElementById('f-end-extra-'+idx)?.value.trim()||null;
      entry.referencia=document.getElementById('f-ref-extra-'+idx)?.value.trim()||null;
    }
    extras.push(entry);
  });
  return extras.length?extras:null;
}

async function savePedido(){
  const nome=document.getElementById('f-nome').value.trim();
  const cpf=document.getElementById('f-cpf').value.trim();
  const rg=document.getElementById('f-rg').value.trim();
  const nasc=document.getElementById('f-nascimento').value;
  const uc=document.getElementById('f-uc').value.trim();
  const tel=document.getElementById('f-telefone').value.trim();
  const end=document.getElementById('f-endereco').value.trim();
  const tipo=document.getElementById('f-tipo').value;
  if(!nome||!cpf||!nasc||!uc||!tel||!end||!tipo){showToast('Preencha todos os campos obrigatórios',true);return;}
  const conexao=document.getElementById('f-conexao').value;
  if(tipo==='alteracao_conexao'&&!conexao){showToast('Selecione o tipo de conexão',true);return;}
  const temD=document.getElementById('f-tem-deslig').checked;
  let ucD=null,titD=null,cpfD=null,nascD=null,maeD=null,paiD=null,telD=null,emailD=null,endD=null,refD=null;
  if(tipo==='alteracao_conexao'&&temD){
    ucD=document.getElementById('f-uc-deslig').value.trim();
    if(!ucD){showToast('Informe a UC a ser desligada',true);return;}
    if(document.querySelector('input[name="titular-deslig"]:checked').value==='outro'){
      titD=document.getElementById('f-titular-deslig').value.trim()||null;
      cpfD=document.getElementById('f-cpf-deslig').value.trim()||null;
      nascD=document.getElementById('f-nasc-deslig').value||null;
      maeD=document.getElementById('f-mae-deslig').value.trim()||null;
      paiD=document.getElementById('f-pai-deslig').value.trim()||null;
      telD=document.getElementById('f-tel-deslig').value.trim()||null;
      emailD=document.getElementById('f-email-deslig').value.trim()||null;
      endD=document.getElementById('f-end-deslig').value.trim()||null;
      refD=document.getElementById('f-ref-deslig').value.trim()||null;
    }
  }
  const body={
    nome_titular:nome,cpf,rg:rg||null,data_nascimento:nasc,unidade_consumidora:uc,telefone:tel,
    email:document.getElementById('f-email').value.trim()||null,
    nome_mae:document.getElementById('f-mae').value.trim()||null,
    nome_pai:document.getElementById('f-pai').value.trim()||null,
    endereco:end,ponto_referencia:document.getElementById('f-referencia').value.trim()||null,
    tipo_solicitacao:tipo,tipo_conexao:tipo==='alteracao_conexao'?conexao:null,
    uc_desligamento:ucD,titular_desligamento:titD,cpf_desligamento:cpfD,
    nascimento_desligamento:nascD,nome_mae_desligamento:maeD,nome_pai_desligamento:paiD,
    telefone_desligamento:telD,email_desligamento:emailD,endereco_desligamento:endD,referencia_desligamento:refD,
    ucs_desligamento_extras:tipo==='alteracao_conexao'&&temD?collectUcsExtras():null,
    observacoes:document.getElementById('f-obs').value.trim()||null,status:'aberto'
  };
  try{await api('POST','/rest/v1/pedidos',body);showToast('Pedido cadastrado!');closeModal('modal-new');clearForm();await load();}
  catch(e){showToast('Erro ao salvar',true);}
}

function maskPhone(el){let v=el.value.replace(/\D/g,'').substring(0,11);v=v.replace(/^(\d{2})(\d)/,'($1) $2').replace(/(\d{5})(\d)/,'$1-$2');el.value=v;}

async function gerarOS(tipo){

  if(!p){showToast('Nenhum pedido selecionado',true);return;}
  const campo=tipo==='solicitacao'?'num_os_solicitacao':'num_os_execucao';
  const fn=tipo==='solicitacao'?'gerar_os_solicitacao':'gerar_os_execucao';
  let numOS=p[campo];
  try{
    if(!numOS){
      const r=await api('POST',`/rest/v1/rpc/${fn}`,{pedido_id:p.id});
      numOS=r; p[campo]=numOS;
      all=all.map(x=>x.id===p.id?{...x,[campo]:numOS}:x);
    }
  }catch(e){showToast('Erro ao gerar número da OS',true);return;}

  const d=new Date(p.created_at).toLocaleDateString('pt-BR');
  const dn=p.data_nascimento?new Date(p.data_nascimento+'T00:00:00').toLocaleDateString('pt-BR'):'—';
  const tipoLabel=TL[p.tipo_solicitacao]+(p.tipo_conexao?' — '+CL[p.tipo_conexao]:'');
  const isSol=tipo==='solicitacao';
  const corTopo=isSol?'#004358':'#FD7400';
  const labelOS=isSol?'Ordem de Serviço — Solicitação':'Ordem de Serviço — Execução';
  const descricao=(()=>{
    if(p.tipo_conexao)return`Alteração de conexão para ${CL[p.tipo_conexao]}${p.uc_desligamento?', com desligamento vinculado de UC':''}`;

    if(p.tipo_solicitacao==='troca_padrao')return'Troca de padrão — substituição do poste de entrada';
